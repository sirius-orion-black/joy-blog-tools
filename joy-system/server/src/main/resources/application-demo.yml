server:
  port: 8081
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/name?characterEncoding=UTF-8&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&tinyInt1isBit=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: name
    password: pwd
    hikari:
      maxLifetime: 1200000  # 20 分钟
      validationTimeout: 5000  # 5 秒
      connectionTestQuery: SELECT 1
  redis:
    host: 127.0.0.1
    port: 6379
    timeout: 5000
    database: 6
    password: pwd
    lettuce:
      pool:
        max-active: 20
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
      shutdown-timeout: 100ms
    keep-alive: true # 发送心跳保活

  #==============================邮箱配置==============================
  mail:
    host: you email host
    port: you port
    username: username
    password: password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        debug: false
